syntax = "proto3";

package trackprocessor;

service TrackProcessor {
  // Process instructions
  rpc ProcessInstructions (stream Instructions) returns (stream Chunk) {}
  rpc Ping (PingRequest) returns (Pong) {}
}

enum CrossfadeType {
  IN = 0;
  OUT = 1;
}

enum FilterType {
  LOWPASS = 0;
  BANDPASS = 1;
  HIGHPASS = 2;
  LOWGAIN = 3;
  MIDGAIN = 4;
  HIGHGAIN = 5;
  VOLUME = 6;
  TIMESTRETCH = 7;
  LOOP = 8;
  // Creative FX (added 2026-07). Primary knob = startValue/endValue ("amount");
  // secondary knobs live in Filter.params (see ParamRamp). Neutral = 0 unless noted.
  REVERB = 9;       // primary: wet mix.   params: size, damping
  DELAY = 10;       // primary: mix.       params: time (beat frac), feedback
  DISTORTION = 11;  // primary: drive.     params: tone
  GATE = 12;        // primary: depth.     params: rate (beat frac), duty
  BITCRUSHER = 13;  // primary: crush.     params: bits, downsample
  TREMOLO = 14;     // primary: depth.     params: rate (beat frac), shape
  PHASER = 15;      // primary: mix.       params: rate (beat frac), depth, feedback
  CHORUS = 16;      // primary: mix.       params: rate, depth
  FLANGER = 17;     // primary: mix.       params: rate (beat frac), depth, feedback
  NOTCH = 18;       // primary: cut depth. params: freq, q
  PITCHSHIFT = 19;  // primary: semitones (-12..12, neutral 0). params: formant
  REVERSE = 20;     // structural: reverse the segment (like LOOP). no ramp.
}

enum CurveType {
  LINEAR = 0;
  QUADRATIC = 1;
}

message PingRequest {}

message Pong {
  string response = 1;
}

// A single automatable secondary knob (independent ramp + curve).
message ParamRamp {
  double start = 1;        // value at startSample
  double end = 2;          // value at endSample
  CurveType curve = 3;     // per-param ramp shape (LINEAR default)
}

message Filter {
  FilterType type = 1;
  int32 startSample = 2;
  int32 endSample = 3;
  double startValue = 4;   // PRIMARY knob ramp start ("amount")
  double endValue = 5;     // PRIMARY knob ramp end
  CurveType curve = 6;     // primary knob ramp shape
  // Secondary automatable knobs, keyed by name (e.g. "rate", "feedback", "mix",
  // "size", "bits", "time", "q", "depth", "duty", "shape", "formant", "downsample").
  // Empty for all legacy filters (LOWPASS..LOOP).
  map<string, ParamRamp> params = 7;
}

message Operations {
  int32 outputSample = 1;
  int32 trimStartSample = 2;
  int32 trimEndSample = 3;
  CrossfadeType crossfadeType = 4;
  repeated Filter filters = 5;
}

message Track {
  optional bytes buffer = 1;
  optional double bpm = 2;
  optional double samplerate = 3;
  optional int32 bitdepth = 4;
  optional int32 channels = 5;
  optional int32 size = 6;
  optional int32 duration = 7;
  optional string volumePath = 8;
  optional string format = 9;
}

message Chunk {
  optional bytes buffer = 1;
  optional int32 duration = 2;
}

message TrackInstruction {
  int32 trackIndex = 1;
  Operations operations = 2;
}

message Instructions {
  repeated Track tracks = 1;
  repeated TrackInstruction tracksInstructions = 2;
  repeated Filter masterInstructions = 3;
}
