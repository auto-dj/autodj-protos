syntax = "proto3";

package analyzer;

service Analyzer {
  rpc AnalyzeTrack (AnalyzeRequest) returns (AnalyzeResponse);
  rpc Ping (PingRequest) returns (Pong);
}

message AnalyzeRequest {
  string track_id = 1;
  oneof source {
    string s3_key = 2;     // preferred: analyzer pulls directly from S3
    string file_path = 3;  // local dev / on-disk imports
  }
  bool refine_with_madmom = 4; // default true; set false to skip DBN refinement
}

message Segment {
  double start = 1;
  double end = 2;
  string label = 3; // e.g. "intro", "verse", "chorus", "bridge", "outro"
}

message Phrase {
  int32 bar = 1;          // absolute bar number, 1-indexed
  double start = 2;       // start time in seconds (= first downbeat of this phrase)
  int32 length_bars = 3;  // number of bars (up to 8)
  string section = 4;     // structural label of the segment this phrase falls inside
}

// Per-bar RMS energy of each Demucs stem.
// One BarStems entry per bar in the track (parallel to downbeats).
message BarStems {
  int32 bar = 1;     // absolute bar number, 1-indexed (matches Phrase.bar)
  float vocal = 2;   // RMS of the vocal stem over this bar
  float bass = 3;    // RMS of the bass stem over this bar
  float drums = 4;   // RMS of the drums stem over this bar
  float other = 5;   // RMS of the "other" stem over this bar
}

// Fixed-size audio embedding for one segment.
// Index of each entry corresponds to the segment at the same index in AnalyzeResponse.segments.
message SegmentEmbedding {
  repeated float values = 1; // fixed-size embedding vector
}

message AnalyzeResponse {
  double bpm = 1;
  string key = 2;                  // best-effort; empty in v1
  repeated double beats = 3;       // seconds, ms precision (madmom-refined when available)
  repeated double downbeats = 4;   // seconds (beat_in_bar == 1 in madmom output)
  repeated Segment segments = 5;   // boundaries snapped to nearest madmom downbeat
  repeated Phrase phrases = 6;     // 8-bar phrase groups tagged with segment label
  string analyzer_version = 7;     // e.g. "allin1@1.1.0+madmom@0.16.1"
  double duration = 8;             // total duration in seconds
  repeated BarStems bar_stems = 9;             // per-bar RMS for each Demucs stem (vocal/bass/drums/other)
  repeated SegmentEmbedding segment_embeddings = 10; // one fixed-size audio embedding per segment (parallel to `segments`)
  repeated string segment_captions = 11;       // short text caption per segment (parallel to `segments`)

  // Reserve field numbers for forward-compatibility with upcoming analyzer features.
  reserved 12 to 20;
}

message PingRequest {}
message Pong { string response = 1; }
